# Services configuration
services:
- name: blog
  type: local
  command: "pnpm dev"
  working_dir: "../my-blog"
  port: 3000

- name: mini-platform
  type: local
  command: "uvicorn app.main:app --reload"
  working_dir: "."
  port: 8000

- name: demo-nginx
  type: container
  container_name: "mini-platform-nginx"
  image: "docker.io/library/nginx:alpine"
  host_port: 8080
  container_port: 80
